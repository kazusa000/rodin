name: Tests

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: Tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc-14]
        build_type: [Debug, Release]
        multithreaded: [ON, OFF]
        asan: [ON, OFF]
        ubsan: [ON, OFF]
      fail-fast: false

    env:
      MAKEFLAGS: "-j2"
      OMP_NUM_THREADS: 2
      CTEST_PARALLEL_LEVEL: 2

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Cpp (C++ / C)
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          cmake: true

      - name: Install dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          lcov
          libeigen3-dev
          libomp-dev
          libgl1-mesa-dev
          libsdl2-dev
          libglfw3-dev
          libopenal-dev
          libvulkan-dev
          libsuitesparse-dev
          libmetis-dev
          libboost1.74-all-dev

      - name: Configure CMake
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DRODIN_USE_ASAN=${{ matrix.asan }}
          -DRODIN_USE_UBSAN=${{ matrix.ubsan }}
          -DRODIN_BUILD_DOC=OFF
          -DRODIN_USE_MCSS=OFF
          -DRODIN_BUILD_EXAMPLES=OFF
          -DRODIN_BUILD_BENCHMARKS=OFF
          -DRODIN_BUILD_SRC=ON
          -DRODIN_BUILD_UNIT_TESTS=ON
          -DRODIN_BUILD_MANUFACTURED_TESTS=ON
          -DRODIN_CODE_COVERAGE=OFF
          -DRODIN_MULTITHREADED=${{ matrix.multithreaded }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build

      - name: Run unit tests
        run: >
          ctest --test-dir ${{ github.workspace }}/build/tests
          -L unit
          --output-on-failure
          -j ${{ env.CTEST_PARALLEL_LEVEL }}

      - name: Rerun failed unit tests (verbose)
        if: failure()
        run: >
          ctest --test-dir ${{ github.workspace }}/build/tests
          -L unit
          --rerun-failed -V --output-on-failure

  Manufactured:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc-14]
        build_type: [Debug, Release]
        multithreaded: [ON, OFF]
        asan: [ON, OFF]
        ubsan: [ON, OFF]
      fail-fast: false

    env:
      MAKEFLAGS: "-j2"
      OMP_NUM_THREADS: 2
      CTEST_PARALLEL_LEVEL: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Cpp (C++ / C)
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          cmake: true

      - name: Install dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          lcov
          libeigen3-dev
          libomp-dev
          libgl1-mesa-dev
          libsdl2-dev
          libglfw3-dev
          libopenal-dev
          libvulkan-dev
          libsuitesparse-dev
          libsuitesparse-dev
          libmetis-dev
          libboost1.74-all-dev

      - name: Configure CMake
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DRODIN_USE_ASAN=${{ matrix.asan }}
          -DRODIN_USE_UBSAN=${{ matrix.ubsan }}
          -DRODIN_BUILD_DOC=OFF
          -DRODIN_USE_MCSS=OFF
          -DRODIN_BUILD_EXAMPLES=OFF
          -DRODIN_BUILD_BENCHMARKS=OFF
          -DRODIN_BUILD_SRC=ON
          -DRODIN_BUILD_UNIT_TESTS=ON
          -DRODIN_BUILD_MANUFACTURED_TESTS=ON
          -DRODIN_CODE_COVERAGE=OFF
          -DRODIN_MULTITHREADED=${{ matrix.multithreaded }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build

      - name: Run manufactured tests
        run: >
          ctest --test-dir ${{ github.workspace }}/build/tests
          -L manufactured
          --output-on-failure
          -j ${{ env.CTEST_PARALLEL_LEVEL }}

      - name: Rerun failed manufactured tests (verbose)
        if: failure()
        run: >
          ctest --test-dir ${{ github.workspace }}/build/tests
          -L manufactured
          --rerun-failed -V --output-on-failure

  Coverage:
    runs-on: ubuntu-latest
    needs: [Unit, Manufactured]
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc-14]
        build_type: [Debug, Release]
        multithreaded: [ON, OFF]
        asan: [OFF]
        ubsan: [OFF]

    env:
      MAKEFLAGS: "-j2"
      OMP_NUM_THREADS: 2
      CTEST_PARALLEL_LEVEL: 2
      GCOV: gcov-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Cpp (C++ / C)
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          cmake: true

      - name: Install dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          gcc-14 g++-14
          lcov
          libeigen3-dev
          libomp-dev
          libgl1-mesa-dev
          libsdl2-dev
          libglfw3-dev
          libopenal-dev
          libvulkan-dev
          libsuitesparse-dev
          libmetis-dev
          libboost1.74-all-dev

      - name: Configure CMake (coverage)
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DRODIN_USE_ASAN=${{ matrix.asan }}
          -DRODIN_USE_UBSAN=${{ matrix.ubsan }}
          -DRODIN_BUILD_DOC=OFF
          -DRODIN_USE_MCSS=OFF
          -DRODIN_BUILD_EXAMPLES=OFF
          -DRODIN_BUILD_BENCHMARKS=OFF
          -DRODIN_BUILD_SRC=ON
          -DRODIN_BUILD_UNIT_TESTS=ON
          -DRODIN_BUILD_MANUFACTURED_TESTS=ON
          -DRODIN_LCOV_FLAGS="--ignore-errors gcov,gcov --ignore-errors mismatch --ignore-errors unused"
          -DRODIN_CODE_COVERAGE=ON
          -DRODIN_MULTITHREADED=${{ matrix.multithreaded }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build

      - name: Run unit tests (coverage build)
        run: >
          ctest --test-dir ${{ github.workspace }}/build/tests
          -L unit
          --output-on-failure
          -j ${{ env.CTEST_PARALLEL_LEVEL }}

      - name: Run manufactured tests (coverage build)
        run: >
          ctest --test-dir ${{ github.workspace }}/build/tests
          -L manufactured
          --output-on-failure
          -j 1

      - name: Make coverage
        run: cmake --build ${{ github.workspace }}/build --target RodinCoverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ${{ github.workspace }}/build/RodinCoverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.build_type }},mt-${{ matrix.multithreaded }}
          name: cov-${{ matrix.build_type }}-mt${{ matrix.multithreaded }}
          root_dir: ${{ github.workspace }}
          verbose: true
          fail_ci_if_error: true
